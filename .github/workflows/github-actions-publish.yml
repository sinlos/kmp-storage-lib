name: Publish to GitHub Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: '1.0.0-SNAPSHOT'
        required: true
        default: '1.0.0-SNAPSHOT'

jobs:
  publish:
    runs-on: macos-latest # Возвращаемся на доступный раннер
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Android emulator and connected tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
            api-level: 34
            target: google_apis
            arch: arm64-v8a
            script: ./gradlew connectedAndroidDeviceTest

      - name: Run JVM Tests
        run: ./gradlew jvmTest

      - name: Run JS Tests
        run: ./gradlew jsBrowserTest

      - name: Run Wasm Tests
        run: ./gradlew wasmJsBrowserTest

      - name: Publish
        run: ./gradlew publish -Pversion=${{ github.event.inputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
